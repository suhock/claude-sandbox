set -s escape-time 200
set -g mouse on
set -g history-limit 100000
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -g detach-on-destroy on
set -g set-titles on
set -g set-titles-string '#{pane_title}'

# Status bar
set -g status-left-length 80
set -g status-style '#{?client_prefix,bg=yellow fg=black,bg=colour174 fg=black}'
set -g status-right '#[range=user|newclaude] c:+Claude #[norange] #[range=user|newbash] b:+Bash #[norange] '

# Click handler for status bar buttons (falls back to default window switching)
bind -T root MouseDown1Status {
    if -F '#{==:#{mouse_status_range},newclaude}' {
        run-shell '~/new-window.sh claude'
    } {
        if -F '#{==:#{mouse_status_range},newbash}' {
            run-shell '~/new-window.sh bash'
        } {
            select-window
        }
    }
}

# Ctrl-b c = new Claude Code window, Ctrl-b b = new bash window
bind c run-shell '~/new-window.sh claude'
bind b new-window -n bash
