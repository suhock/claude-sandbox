services:
  claude:
    volumes:
      - ${SANDBOX_ROOT:-.}/shared/runtime/init.sh:/init.sh:ro
      - ${SANDBOX_ROOT:-.}/shared/runtime/entrypoint.sh:/entrypoint.sh:ro
