services:
  proxy:
    volumes:
      - ${SANDBOX_ROOT:-.}/proxy/start.sh:/start.sh:ro
      - ${SANDBOX_ROOT:-.}/proxy/allowed-domains.conf:/etc/proxy/allowed-domains.d/00-base.conf:ro
  claude:
    volumes:
      - ${SANDBOX_ROOT:-.}/shared/runtime/init.sh:/init.sh:ro
      - ${SANDBOX_ROOT:-.}/shared/runtime/entrypoint.sh:/entrypoint.sh:ro
      - ${SANDBOX_ROOT:-.}/shared/runtime/tmux-picker.sh:/home/claude/tmux-picker.sh:ro
      - ${SANDBOX_ROOT:-.}/shared/runtime/new-window.sh:/home/claude/new-window.sh:ro
      - ${SANDBOX_ROOT:-.}/shared/config/tmux.conf:/home/claude/.tmux-sandbox.conf:ro
