services:
  picker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - HOST_HOSTNAME=${HOST_HOSTNAME}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${SANDBOX_AUTHORIZED_KEYS}:/host-ssh-keys/authorized_keys
    ports:
      - "${PICKER_SSH_PORT:-22000}:22"
    restart: unless-stopped
