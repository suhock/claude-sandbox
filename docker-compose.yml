networks:
  claude-net:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: ${SUBNET}

services:
  proxy:
    build:
      context: ${SANDBOX_ROOT:-.}
      dockerfile: proxy/Dockerfile
    environment:
      - SANDBOX_ENV=${SANDBOX_ENV:-base}
    networks:
      claude-net:
        ipv4_address: ${PROXY_IP}
      default:
    ports:
      - "${CLAUDE_SSH_PORT:-2222}:22"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "22"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  claude:
    build:
      context: ${SANDBOX_ROOT:-.}
      dockerfile: shared/Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-debian:bookworm-slim}
        ENV_NAME: ${ENV_NAME:-base}
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      claude-net:
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    dns:
      - ${PROXY_IP}
    hostname: claude-sandbox
    environment:
      - PROXY_IP=${PROXY_IP}
      - SANDBOX_ENV=${SANDBOX_ENV:-unknown}
      - SANDBOX_WORKSPACE=${SANDBOX_WORKSPACE:-workspace}
      - DISABLE_AUTOUPDATER=1
      - TERM=xterm-256color
    volumes:
      - ${DEV_DIR:-/dev/null}:/workspace
      - ${CLAUDE_STATE_DIR:-/dev/null}:/home/claude/.claude
      - ${CLAUDE_STATE_DIR:-/dev/null}/.claude.json:/home/claude/.claude.json
      - ${HOST_PLUGINS_DIR:-/dev/null}:/host-plugins:ro
      - ${SANDBOX_AUTHORIZED_KEYS}:/host-ssh-keys/authorized_keys:ro
