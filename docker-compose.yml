networks:
  claude-net:
    name: claude-net
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  proxy:
    build: ./proxy
    container_name: claude-proxy
    networks:
      claude-net:
        ipv4_address: 172.28.0.2
      default:
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "3128"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  claude:
    build: ./claude-dotnet
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      claude-net:
      default:
    hostname: claude-sandbox
    dns:
      - 172.28.0.2
    ports:
      - "${CLAUDE_SSH_PORT:-2222}:22"
    environment:
      - HTTPS_PROXY=http://172.28.0.2:3128
      - HTTP_PROXY=http://172.28.0.2:3128
      - NO_PROXY=localhost,127.0.0.1
      - DISABLE_AUTOUPDATER=1
      - TERM=xterm-256color
    volumes:
      - ${DEV_DIR:-/dev/null}:/workspace
      - ${HOME:-/dev/null}/.nuget/packages:/home/claude/.nuget/packages
      - ${CLAUDE_STATE_DIR:-/dev/null}:/home/claude/.claude
      - ${CLAUDE_STATE_DIR:-/dev/null}/.claude.json:/home/claude/.claude.json
      - ${HOST_PLUGINS_DIR:-/dev/null}:/host-plugins:ro
      - ${HOST_SSH_DIR:-/dev/null}:/host-ssh-keys:ro
