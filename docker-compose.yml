networks:
  claude-net:
    driver: bridge
    internal: true

services:
  proxy:
    build: ./proxy
    networks:
      claude-net:
      default:
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "3128"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  claude:
    build:
      context: ${SANDBOX_ROOT:-.}
      dockerfile: shared/Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-debian:bookworm-slim}
        ENV_NAME: ${ENV_NAME:-base}
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      claude-net:
      default:
    hostname: claude-sandbox
    ports:
      - "${CLAUDE_SSH_PORT:-2222}:22"
    environment:
      - HTTPS_PROXY=http://proxy:3128
      - HTTP_PROXY=http://proxy:3128
      - NO_PROXY=localhost,127.0.0.1
      - SANDBOX_ENV=${SANDBOX_ENV:-unknown}
      - SANDBOX_WORKSPACE=${SANDBOX_WORKSPACE:-workspace}
      - DISABLE_AUTOUPDATER=1
      - TERM=xterm-256color
    volumes:
      - ${DEV_DIR:-/dev/null}:/workspace
      - ${CLAUDE_STATE_DIR:-/dev/null}:/home/claude/.claude
      - ${CLAUDE_STATE_DIR:-/dev/null}/.claude.json:/home/claude/.claude.json
      - ${HOST_PLUGINS_DIR:-/dev/null}:/host-plugins:ro
      - ${HOST_SSH_DIR:-/dev/null}:/host-ssh-keys:ro
      - ${SANDBOX_ROOT:-.}/shared/tmux-picker.sh:/home/claude/tmux-picker.sh:ro
      - ${SANDBOX_ROOT:-.}/shared/entrypoint.sh:/entrypoint.sh:ro
